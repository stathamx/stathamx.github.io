<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diagnostic Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #A3B565; --bg: #000; --card: #111; --text: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 10px; }
        
        .container { max-width: 800px; margin: 0 auto; background: var(--card); border: 1px solid #222; padding: 20px; }
        h2 { font-family: 'Bebas Neue'; color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { font-family: 'JetBrains Mono'; font-size: 0.6rem; color: #555; margin-bottom: 20px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        .full { grid-column: span 2; }
        label { font-family: 'JetBrains Mono'; font-size: 0.65rem; color: var(--primary); text-transform: uppercase; }
        input, select { background: #050505; border: 1px solid #333; padding: 10px; color: #fff; font-size: 1rem; }
        
        .toggle-group { display: flex; gap: 5px; }
        .toggle-btn { flex: 1; padding: 10px; border: 1px solid #333; background: transparent; color: #666; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1rem; }
        .toggle-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(163,181,101,0.1); }

        .btn-main { background: var(--primary); color: #000; border: none; padding: 15px; font-family: 'Bebas Neue'; font-size: 1.4rem; cursor: pointer; margin-top: 15px; width: 100%; }

        .results { display: none; margin-top: 25px; }
        .res-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .res-card { background: #050505; border-bottom: 2px solid #222; padding: 12px; }
        .res-card.accent { border-color: var(--primary); grid-column: span 2; }
        .res-label { font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--primary); display: block; margin-bottom: 3px; }
        .res-val { font-family: 'Bebas Neue'; font-size: 1.8rem; line-height: 1; }
        .res-sub { font-size: 0.7rem; color: #555; }

        .bmi-box { grid-column: span 2; background: #080808; padding: 12px; border: 1px solid #222; }
        .bmi-bar { height: 4px; background: linear-gradient(to right, #3498db, #2ecc71, #f1c40f, #e74c3c); margin: 8px 0; position: relative; }
        .bmi-ptr { position: absolute; top: -4px; width: 3px; height: 12px; background: #fff; }

        .theory-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .theory-card h4 { font-family: 'Bebas Neue'; color: var(--primary); font-size: 1.1rem; margin-bottom: 3px; }
        .theory-card p { font-size: 0.75rem; color: #666; line-height: 1.3; margin-bottom: 10px; }

        .btn-copy { background: transparent; border: 1px solid #333; color: #888; padding: 12px; font-family: 'JetBrains Mono'; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: 10px; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .res-grid { grid-template-columns: 1fr 1fr; }
            .res-card.accent, .bmi-box, .res-card.macros-wide { grid-column: span 2; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>NUTRITION DIAGNOSTICS</h2>
    <p class="subtitle">STATHAM COMMUNITY • ENGINE V2.2</p>

    <div class="form-grid">
        <div class="group full">
            <label>ПОЛ</label>
            <div class="toggle-group" id="genderGroup">
                <button class="toggle-btn active" onclick="setToggle('gender', 'male', this)">МУЖСКОЙ</button>
                <button class="toggle-btn" onclick="setToggle('gender', 'female', this)">ЖЕНСКИЙ</button>
            </div>
        </div>
        <div class="group"><label>ВЕС (КГ)</label><input type="number" id="weight" placeholder="75"></div>
        <div class="group"><label>РОСТ (СМ)</label><input type="number" id="height" placeholder="180"></div>
        <div class="group full">
            <label>ВОЗРАСТ / АКТИВНОСТЬ</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="age" style="width:70px" placeholder="25">
                <select id="activity" style="flex-grow:1;">
                    <option value="1.2">Сидячий</option>
                    <option value="1.55" selected>Средний</option>
                    <option value="1.725">Высокий</option>
                </select>
            </div>
        </div>
        <div class="group full">
            <label>ЦЕЛЬ</label>
            <div class="toggle-group">
                <button class="toggle-btn" onclick="setToggle('goal', 'loss', this)">СУШКА</button>
                <button class="toggle-btn active" onclick="setToggle('goal', 'main', this)">БАЛАНС</button>
                <button class="toggle-btn" onclick="setToggle('goal', 'gain', this)">МАССА</button>
            </div>
        </div>
        <button class="btn-main full" onclick="calculate()">ПРОВЕСТИ АНАЛИЗ</button>
    </div>

    <div class="results" id="results">
        <div class="res-grid">
            <div class="res-card accent"><span class="res-label">ЦЕЛЕВАЯ КАЛОРИЙНОСТЬ</span><span class="res-val" id="outKcal">0</span><span class="res-sub">ККАЛ / ДЕНЬ</span></div>
            <div class="res-card"><span class="res-label">ВОДА</span><span class="res-val" id="outWater">0</span><span class="res-sub">ЛИТРОВ</span></div>
            <div class="res-card"><span class="res-label">УБМ (BMR)</span><span class="res-val" id="outBmr">0</span><span class="res-sub">БАЗА</span></div>
            
            <div class="bmi-box">
                <span class="res-label">BMI (ИМТ): <span id="outBmi">0</span></span>
                <div class="bmi-bar"><div class="bmi-ptr" id="bmiPtr"></div></div>
            </div>

            <div class="res-card"><span class="res-label">БЕЛКИ</span><span class="res-val" id="outP">0</span><span class="res-sub" id="outPk">0к</span></div>
            <div class="res-card"><span class="res-label">ЖИРЫ</span><span class="res-val" id="outF">0</span><span class="res-sub" id="outFk">0к</span></div>
            <div class="res-card macros-wide" style="grid-column: span 2;"><span class="res-label">УГЛЕВОДЫ</span><span class="res-val" id="outC">0</span><span class="res-sub" id="outCk">0к</span></div>
        </div>
        <div class="theory-section">
            <div class="theory-card"><h4>МИФФЛИН-САН ЖЕОРА</h4><p>Используется для расчета суточных энергозатрат.</p></div>
        </div>
        <button class="btn-copy" onclick="copyReport()">СКОПИРОВАТЬ ОТЧЕТ В ТЕЛЕГРАМ</button>
    </div>
</div>
<script>
    let data = { gender: 'male', goal: 'main' };
    function setToggle(k, v, el) {
        el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        el.classList.add('active'); data[k] = v;
    }
    function calculate() {
        const w = parseFloat(document.getElementById('weight').value), h = parseFloat(document.getElementById('height').value), a = parseFloat(document.getElementById('age').value);
        if(!w || !h || !a) return alert("Введите данные!");
        let b = (10 * w) + (6.25 * h) - (5 * a);
        b = (data.gender === 'male') ? b + 5 : b - 161;
        let t = b * parseFloat(document.getElementById('activity').value);
        if(data.goal === 'loss') t *= 0.8; else if(data.goal === 'gain') t *= 1.2;
        
        document.getElementById('results').style.display = 'block';
        document.getElementById('outKcal').innerText = Math.round(t);
        document.getElementById('outBmr').innerText = Math.round(b);
        const water = (data.gender === 'male' ? w * 0.033 : w * 0.03).toFixed(1);
        document.getElementById('outWater').innerText = water;
        const bmi = (w / ((h/100)**2)).toFixed(1);
        document.getElementById('outBmi').innerText = bmi;
        document.getElementById('bmiPtr').style.left = Math.min(Math.max(((bmi - 15) / 20) * 100, 0), 100) + '%';
        
        const p = Math.round(w * 2), f = Math.round(w * 1);
        const c = Math.round((t - (p*4) - (f*9)) / 4);
        document.getElementById('outP').innerText = p + 'г';
        document.getElementById('outPk').innerText = (p*4) + ' ккал';
        document.getElementById('outF').innerText = f + 'г';
        document.getElementById('outFk').innerText = (f*9) + ' ккал';
        document.getElementById('outC').innerText = c + 'г';
        document.getElementById('outCk').innerText = (c*4) + ' ккал';
    }
    function copyReport() {
        const kcal = document.getElementById('outKcal').innerText;
        const bmi = document.getElementById('outBmi').innerText;
        const water = document.getElementById('outWater').innerText;
        const p = document.getElementById('outP').innerText;
        const f = document.getElementById('outF').innerText;
        const c = document.getElementById('outC').innerText;

        const text = `📊 STATHAM DIAGNOSTIC REPORT\n\n🎯 Цель: ${kcal} ккал/день\n⚖️ ИМТ: ${bmi}\n💧 Вода: ${water}л\n\n🥩 Белки: ${p}\n🥑 Жиры: ${f}\n🍝 Углеводы: ${c}\n\nСделано в Statham Community.`;
        navigator.clipboard.writeText(text).then(() => alert("Отчет скопирован!"));
    }
</script>
</body>
</html>

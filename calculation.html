<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор КБЖУ — Statham Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #0A0A0A;
            color: #F5F5F5;
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .calculator-container {
            background-color: #1A1A1A;
            border-radius: 8px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            border-left: 4px solid #A3B565;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 {
            font-family: 'Bebas Neue', sans-serif;
            color: #A3B565;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ddd;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 0.8rem;
            background-color: #0A0A0A;
            border: 1px solid #333;
            border-radius: 4px;
            color: #F5F5F5;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #A3B565;
        }
        .btn-calc {
            background: transparent;
            border: 2px solid #A3B565;
            color: #A3B565;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn-calc:hover {
            background: #A3B565;
            color: #0A0A0A;
        }
        .result-box {
            margin-top: 2rem;
            background: #0F0F0F;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #A3B565;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #333;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-value {
            color: #A3B565;
            font-weight: bold;
        }
        .note {
            font-size: 0.9rem;
            color: #888;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h2>Калькулятор КБЖУ</h2>
        <form id="calcForm">
            <div class="form-group">
                <label>Пол</label>
                <select id="gender" required>
                    <option value="male">Мужской</option>
                    <option value="female">Женский</option>
                </select>
            </div>
            <div class="form-group">
                <label>Вес (кг)</label>
                <input type="number" id="weight" step="0.1" min="30" max="200" required>
            </div>
            <div class="form-group">
                <label>Рост (см)</label>
                <input type="number" id="height" step="0.1" min="100" max="250" required>
            </div>
            <div class="form-group">
                <label>Возраст (лет)</label>
                <input type="number" id="age" min="10" max="100" required>
            </div>
            <div class="form-group">
                <label>Уровень активности</label>
                <select id="activity">
                    <option value="1.2">Сидячий (нет тренировок)</option>
                    <option value="1.375">Лёгкая (1-3 тренировки/нед)</option>
                    <option value="1.55" selected>Средняя (3-5 тренировок/нед)</option>
                    <option value="1.725">Высокая (5-7 тренировок/нед)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Цель</label>
                <select id="goal">
                    <option value="weight_loss">Похудение</option>
                    <option value="maintain">Поддержание веса</option>
                    <option value="weight_gain">Набор массы</option>
                </select>
            </div>
            <button type="button" class="btn-calc" onclick="calculate()">Рассчитать</button>
        </form>

        <div id="result" class="result-box" style="display: none;">
        </div>
        <div class="note">Расчёт по формуле Миффлина-Сан Жеора. Белки ~2 г/кг, жиры ~1 г/кг, углеводы — остаток.</div>
    </div>

    <script>
        function calculate() {
            const gender = document.getElementById('gender').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const age = parseFloat(document.getElementById('age').value);
            const activity = parseFloat(document.getElementById('activity').value);
            const goal = document.getElementById('goal').value;

            if (!weight || !height || !age) {
                alert('Заполните все поля');
                return;
            }

            let bmr;
            if (gender === 'male') {
                bmr = 10 * weight + 6.25 * height - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * height - 5 * age - 161;
            }

            const maintainCalories = bmr * activity;

            let targetCalories;
            switch (goal) {
                case 'weight_loss':
                    targetCalories = maintainCalories * 0.8;
                    break;
                case 'weight_gain':
                    targetCalories = maintainCalories * 1.2;
                    break;
                default:
                    targetCalories = maintainCalories;
            }

            const proteinPerKg = 2.0;
            const fatPerKg = 1.0;

            const proteinG = weight * proteinPerKg;
            const fatG = weight * fatPerKg;

            const proteinKcal = proteinG * 4;
            const fatKcal = fatG * 9;

            let carbsKcal = targetCalories - (proteinKcal + fatKcal);
            if (carbsKcal < 0) {
                carbsKcal = 0;
            }
            const carbsG = carbsKcal / 4;

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="result-item"><span>Базальный метаболизм (BMR)</span> <span class="result-value">${Math.round(bmr)} ккал</span></div>
                <div class="result-item"><span>Поддержание веса</span> <span class="result-value">${Math.round(maintainCalories)} ккал</span></div>
                <div class="result-item"><span>Целевая калорийность</span> <span class="result-value" style="font-size: 1.2rem;">${Math.round(targetCalories)} ккал</span></div>
                <div class="result-item"><span>Белки</span> <span class="result-value">${proteinG.toFixed(1)} г (${Math.round(proteinKcal)} ккал)</span></div>
                <div class="result-item"><span>Жиры</span> <span class="result-value">${fatG.toFixed(1)} г (${Math.round(fatKcal)} ккал)</span></div>
                <div class="result-item"><span>Углеводы</span> <span class="result-value">${carbsG.toFixed(1)} г (${Math.round(carbsKcal)} ккал)</span></div>
                <div style="margin-top: 1rem; font-size: 0.9rem; color: #A3B565;">* Рекомендация: корректируйте под самочувствие.</div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statham Diagnostic Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #A3B565; --bg: #000; --card: #111; --text: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; overflow-x: hidden; }
        
        .container { max-width: 800px; margin: 0 auto; background: var(--card); border: 1px solid #222; padding: 25px; }
        h2 { font-family: 'Bebas Neue'; color: var(--primary); font-size: 2rem; margin-bottom: 5px; }
        .subtitle { font-family: 'JetBrains Mono'; font-size: 0.65rem; color: #555; margin-bottom: 20px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        .full { grid-column: span 2; }
        label { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--primary); }
        input, select { background: #050505; border: 1px solid #333; padding: 10px; color: #fff; font-size: 1rem; border-radius: 0; appearance: none; }
        
        .toggle-group { display: flex; gap: 5px; }
        .toggle-btn { flex: 1; padding: 10px; border: 1px solid #333; background: transparent; color: #666; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1rem; }
        .toggle-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(163,181,101,0.1); }

        .btn-main { background: var(--primary); color: #000; border: none; padding: 15px; font-family: 'Bebas Neue'; font-size: 1.4rem; cursor: pointer; margin-top: 15px; width: 100%; }

        .results { display: none; margin-top: 30px; }
        .res-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .res-card { background: #050505; border-bottom: 2px solid #222; padding: 15px; }
        .res-card.accent { border-color: var(--primary); grid-column: span 2; }
        .res-label { font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--primary); display: block; margin-bottom: 5px; }
        .res-val { font-family: 'Bebas Neue'; font-size: 1.8rem; }
        .res-sub { font-size: 0.7rem; color: #555; }

        .bmi-box { grid-column: span 2; background: #080808; padding: 15px; border: 1px solid #222; }
        .bmi-bar { height: 6px; background: linear-gradient(to right, #3498db, #2ecc71, #f1c40f, #e74c3c); margin: 10px 0; position: relative; }
        .bmi-ptr { position: absolute; top: -5px; width: 3px; height: 16px; background: #fff; }

        .theory-section { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .theory-card { margin-bottom: 15px; }
        .theory-card h4 { font-family: 'Bebas Neue'; color: var(--primary); margin-bottom: 5px; }
        .theory-card p { font-size: 0.8rem; color: #777; line-height: 1.4; }

        .btn-copy { background: transparent; border: 1px solid #333; color: #666; padding: 10px; font-family: 'JetBrains Mono'; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: 10px; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .res-grid { grid-template-columns: 1fr; }
            .res-card.accent, .bmi-box { grid-column: span 1; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NUTRITION CENTER</h2>
    <p class="subtitle">STATHAM COMMUNITY • ENGINE V2.0</p>

    <div class="form-grid">
        <div class="group full">
            <label>ПОЛ</label>
            <div class="toggle-group" id="genderGroup">
                <button class="toggle-btn active" onclick="setToggle('gender', 'male', this)">МУЖСКОЙ</button>
                <button class="toggle-btn" onclick="setToggle('gender', 'female', this)">ЖЕНСКИЙ</button>
            </div>
        </div>
        <div class="group"><label>ВЕС (КГ)</label><input type="number" id="weight" placeholder="00"></div>
        <div class="group"><label>РОСТ (СМ)</label><input type="number" id="height" placeholder="000"></div>
        <div class="group full">
            <label>ВОЗРАСТ / АКТИВНОСТЬ</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="age" style="width:70px" placeholder="25">
                <select id="activity" style="flex-grow:1;">
                    <option value="1.2">Сидячий</option>
                    <option value="1.55" selected>Средний</option>
                    <option value="1.725">Высокий</option>
                </select>
            </div>
        </div>
        <div class="group full">
            <label>ВАША ЦЕЛЬ</label>
            <div class="toggle-group" id="goalGroup">
                <button class="toggle-btn" onclick="setToggle('goal', 'loss', this)">СУШКА</button>
                <button class="toggle-btn active" onclick="setToggle('goal', 'main', this)">БАЛАНС</button>
                <button class="toggle-btn" onclick="setToggle('goal', 'gain', this)">МАССА</button>
            </div>
        </div>
        <button class="btn-main full" onclick="calculate()">АНАЛИЗ</button>
    </div>

    <div class="results" id="results">
        <div class="res-grid">
            <div class="res-card accent"><span class="res-label">ЦЕЛЬ</span><span class="res-val" id="outKcal">0</span><span class="res-sub">ККАЛ</span></div>
            <div class="res-card"><span class="res-label">ВОДА</span><span class="res-val" id="outWater">0</span><span class="res-sub">ЛИТРОВ</span></div>
            <div class="res-card"><span class="res-label">BMR</span><span class="res-val" id="outBmr">0</span><span class="res-sub">БАЗА</span></div>
            <div class="bmi-box">
                <span class="res-label">BMI: <span id="outBmi">0</span></span>
                <div class="bmi-bar"><div class="bmi-ptr" id="bmiPtr"></div></div>
            </div>
            <div class="res-card"><span class="res-label">БЕЛКИ</span><span class="res-val" id="outP">0</span><span class="res-sub" id="outPk">0к</span></div>
            <div class="res-card"><span class="res-label">ЖИРЫ</span><span class="res-val" id="outF">0</span><span class="res-sub" id="outFk">0к</span></div>
        </div>
        <button class="btn-copy" onclick="copyReport()">КОПИРОВАТЬ ОТЧЕТ</button>
    </div>
</div>

<script>
    let data = { gender: 'male', goal: 'main' };
    function setToggle(k, v, el) {
        el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        el.classList.add('active'); data[k] = v;
    }
    function calculate() {
        const w = parseFloat(document.getElementById('weight').value), h = parseFloat(document.getElementById('height').value), a = parseFloat(document.getElementById('age').value);
        if(!w || !h || !a) return;
        let bmr = (10 * w) + (6.25 * h) - (5 * a);
        bmr = (data.gender === 'male') ? bmr + 5 : bmr - 161;
        const act = parseFloat(document.getElementById('activity').value);
        let target = bmr * act;
        if(data.goal === 'loss') target *= 0.8; else if(data.goal === 'gain') target *= 1.2;
        document.getElementById('results').style.display = 'block';
        document.getElementById('outKcal').innerText = Math.round(target);
        document.getElementById('outBmr').innerText = Math.round(bmr);
        document.getElementById('outWater').innerText = (data.gender === 'male' ? w*0.033 : w*0.03).toFixed(1);
        const bmi = w / ((h/100)**2);
        document.getElementById('outBmi').innerText = bmi.toFixed(1);
        document.getElementById('bmiPtr').style.left = Math.min(Math.max(((bmi - 15) / 20) * 100, 0), 100) + '%';
        const p = w*2, f = w*1;
        document.getElementById('outP').innerText = p + 'г';
        document.getElementById('outPk').innerText = (p*4) + 'ккал';
        document.getElementById('outF').innerText = f + 'г';
        document.getElementById('outFk').innerText = (f*9) + 'ккал';
    }
    function copyReport() {
        const text = `STATHAM REPORT: ${document.getElementById('outKcal').innerText} ккал. Рост или стагнация.`;
        navigator.clipboard.writeText(text); alert("Скопировано!");
    }
</script>
</body>
</html>

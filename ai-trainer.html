<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trainer Prompt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #A3B565; --bg: #000; --card: #111; --text: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); border: 1px solid #222; padding: 25px; }
        h2 { font-family: 'Bebas Neue'; color: var(--primary); font-size: 2rem; }
        .desc { font-size: 0.9rem; color: #888; margin-bottom: 25px; line-height: 1.4; border-left: 2px solid var(--primary); padding-left: 15px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 6px; }
        .full { grid-column: span 2; }
        label { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; }
        input, select, textarea { background: #050505; border: 1px solid #333; padding: 12px; color: #fff; font-size: 1rem; width: 100%; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #080808; padding: 15px; border: 1px solid #222; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; cursor: pointer; }
        .check-item input { width: auto; cursor: pointer; }

        .btn-generate { background: var(--primary); color: #000; border: none; padding: 18px; font-family: 'Bebas Neue'; font-size: 1.5rem; cursor: pointer; margin-top: 20px; width: 100%; }

        #result-box { display: none; margin-top: 30px; background: #050505; border: 1px solid var(--primary); padding: 20px; position: relative; }
        #prompt-text { font-family: 'JetBrains Mono'; font-size: 0.85rem; color: #ccc; white-space: pre-wrap; line-height: 1.5; max-height: 300px; overflow-y: auto; }
        .btn-copy { background: #fff; color: #000; border: none; padding: 10px 20px; font-family: 'JetBrains Mono'; font-size: 0.75rem; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .checkbox-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>AI TRAINER PROMPT</h2>
    <p class="desc">Сформируй идеальный промт для ChatGPT или DeepSeek. Введи свои данные, скопируй результат и получи профессиональный план тренировок за секунды.</p>

    <div class="form-grid">
        <div class="group"><label>ПОЛ</label><select id="gender"><option value="Мужской">Мужской</option><option value="Женский">Женский</option></select></div>
        <div class="group"><label>ВОЗРАСТ</label><input type="number" id="age" placeholder="25"></div>
        <div class="group"><label>ВЕС (КГ)</label><input type="number" id="weight" placeholder="75"></div>
        <div class="group"><label>РОСТ (СМ)</label><input type="number" id="height" placeholder="180"></div>
        
        <div class="group full">
            <label>ОСНОВНАЯ ЦЕЛЬ</label>
            <select id="goal">
                <option value="Похудение (сжигание жира)">Похудение (сжигание жира)</option>
                <option value="Набор мышечной массы">Набор мышечной массы</option>
                <option value="Повышение выносливости">Повышение выносливости</option>
                <option value="Тонус и поддержание формы">Тонус и поддержание формы</option>
                <option value="Увеличение силы">Увеличение силы</option>
            </select>
        </div>

        <div class="group full">
            <label>УРОВЕНЬ ПОДГОТОВКИ</label>
            <select id="level">
                <option value="Новичок (не занимался спортом)">Новичок (не занимался спортом)</option>
                <option value="Опытный (занимался когда-то в зале, на улице, дома)">Опытный (занимался когда-то)</option>
                <option value="Профи (занимаюсь более 3 лет)">Профи (занимаюсь более 3 лет)</option>
            </select>
        </div>

        <div class="group full">
            <label>МЕСТО ТРЕНИРОВОК</label>
            <select id="location" onchange="toggleEquipment()">
                <option value="Спортзал">Спортзал (весь инвентарь доступен)</option>
                <option value="Дом/Улица">Дом / Улица (ограниченный инвентарь)</option>
            </select>
        </div>

        <div class="group full" id="eq-container" style="display: none;">
            <label>ДОСТУПНЫЙ ИНВЕНТАРЬ</label>
            <div class="checkbox-group">
                <label class="check-item"><input type="checkbox" value="Турник"> Турник</label>
                <label class="check-item"><input type="checkbox" value="Брусья"> Брусья</label>
                <label class="check-item"><input type="checkbox" value="Гантели"> Гантели</label>
                <label class="check-item"><input type="checkbox" value="Эспандеры"> Эспандеры</label>
                <label class="check-item"><input type="checkbox" value="Резинки"> Резинки</label>
                <label class="check-item"><input type="checkbox" value="Собственный вес"> Только собственный вес</label>
            </div>
            <input type="text" id="eq-other" placeholder="Что-то еще? (через запятую)" style="margin-top: 10px;">
        </div>

        <div class="group"><label>ГРАФИК (В НЕДЕЛЮ)</label>
            <select id="schedule">
                <option value="1-3 раза в неделю">1-3 тренировки</option>
                <option value="4-5 раз в неделю">4-5 тренировок</option>
                <option value="6-7 раз в неделю">6-7 тренировок</option>
            </select>
        </div>

        <div class="group"><label>ДЛИТЕЛЬНОСТЬ</label>
            <select id="duration">
                <option value="30-60 минут">30-60 мин</option>
                <option value="60-90 минут">60-90 мин</option>
                <option value="90-120 минут">90-120 мин</option>
                <option value="Более 120 минут">Более 120 мин</option>
            </select>
        </div>

        <div class="group full">
            <label>ПРЕДПОЧТИТЕЛЬНЫЙ ТИП</label>
            <select id="type">
                <option value="Full Body (все тело за тренировку)">Full Body (все тело)</option>
                <option value="Сплит (по группам мышц)">Сплит (раздельно)</option>
                <option value="Круговая тренировка">Круговая тренировка</option>
            </select>
        </div>

        <div class="group full"><label>ОГРАНИЧЕНИЯ (ТРАВМЫ)</label><textarea id="health" placeholder="Например: грыжа в пояснице, боли в колене. Если нет - оставь пустым."></textarea></div>

        <button class="btn-generate full" onclick="generatePrompt()">СФОРМИРОВАТЬ ПРОМТ</button>
    </div>

    <div id="result-box">
        <div id="prompt-text"></div>
        <button class="btn-copy" onclick="copyPrompt()" id="copyBtn">СКОПИРОВАТЬ ГОТОВЫЙ ПРОМТ</button>
    </div>
</div>

<script>
    function toggleEquipment() {
        const loc = document.getElementById('location').value;
        document.getElementById('eq-container').style.display = (loc === 'Дом/Улица') ? 'block' : 'none';
    }

    function generatePrompt() {
        const data = {
            gender: document.getElementById('gender').value,
            age: document.getElementById('age').value || 'не указан',
            weight: document.getElementById('weight').value || 'не указан',
            height: document.getElementById('height').value || 'не указан',
            goal: document.getElementById('goal').value,
            level: document.getElementById('level').value,
            location: document.getElementById('location').value,
            schedule: document.getElementById('schedule').value,
            duration: document.getElementById('duration').value,
            type: document.getElementById('type').value,
            health: document.getElementById('health').value || 'нет'
        };

        let equipment = "";
        if (data.location === 'Спортзал') {
            equipment = "Полный инвентарь спортзала";
        } else {
            const checks = Array.from(document.querySelectorAll('#eq-container input[type="checkbox"]:checked')).map(c => c.value);
            const other = document.getElementById('eq-other').value;
            equipment = checks.join(', ') + (other ? ', ' + other : '');
            if (!equipment) equipment = "Собственный вес";
        }

        const prompt = `Ты — профессиональный фитнес-тренер с многолетним стажем. Составь для меня подробный, индивидуальный план тренировок, учитывая все перечисленные ниже параметры. План должен быть безопасным, эффективным и соответствовать моей цели.

Мои данные:
- Пол: ${data.gender}
- Возраст: ${data.age} лет
- Вес: ${data.weight} кг
- Рост: ${data.height} см
- Основная цель тренировок: ${data.goal}
- Уровень подготовки: ${data.level}
- Место тренировок и инвентарь: ${data.location} (${equipment})
- Ограничения здоровья: ${data.health}
- Количество тренировок в неделю: ${data.schedule}
- Продолжительность одной тренировки: ${data.duration}
- Предпочтительный тип тренировок: ${data.type}

Требования к плану:
1. Разбей план по дням недели. Укажи, какие мышечные группы работают в каждый день.
2. Для каждого упражнения укажи название, количество подходов, повторений, а также рекомендации по интенсивности.
3. Включи рекомендации по разминке перед тренировкой и заминке (растяжке) после.
4. Учитывая мои ограничения здоровья, исключи опасные упражнения.
5. Кратко опиши, как прогрессировать нагрузку со временем.
Оформи ответ понятно, используй списки, избегай лишней воды.`;

        document.getElementById('prompt-text').innerText = prompt;
        document.getElementById('result-box').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyPrompt() {
        const text = document.getElementById('prompt-text').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "ГОТОВО! ВСТАВЛЯЙ В НЕЙРОСЕТЬ";
            btn.style.background = "#A3B565";
            setTimeout(() => {
                btn.innerText = "СКОПИРОВАТЬ ГОТОВЫЙ ПРОМТ";
                btn.style.background = "#fff";
            }, 3000);
        });
    }
</script>
</body>
</html>
